<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio Odonto Reis</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Prata&display=swap");

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  background:transparent;
  overflow:hidden;
}

body{
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.or-widget{
  width:100%;
  max-width:520px;
  padding:18px 16px 18px;
  text-align:center;
  color:#4B2910;
  background:
    radial-gradient(circle at 50% 45%, rgba(166,99,60,.10), transparent 45%),
    linear-gradient(135deg,#FBF9F4 0%,#F8F6F1 58%,#F2E9DF 100%);
  font-family:"Manrope",Arial,sans-serif;
}

.or-brand{
  margin:0 0 14px;
  font-size:8px;
  line-height:1;
  font-weight:800;
  letter-spacing:.46em;
  text-transform:uppercase;
  color:#8E421F;
  opacity:.85;
}

.or-clock{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  margin-bottom:16px;
}

.or-pair{
  display:flex;
  gap:4px;
}

.or-digit{
  position:relative;
  width:50px;
  height:72px;
  perspective:900px;
}

.or-half,
.or-flip-top,
.or-flip-bottom{
  position:absolute;
  left:0;
  width:100%;
  height:50%;
  overflow:hidden;
  background:rgba(255,251,245,.84);
  border:1px solid rgba(166,99,60,.14);
  color:#8E421F;
  font-family:"Prata",Georgia,serif;
  font-size:54px;
  font-weight:400;
  letter-spacing:-.08em;
  backface-visibility:hidden;
}

.or-half span,
.or-flip-top span,
.or-flip-bottom span{
  position:absolute;
  left:0;
  width:100%;
  height:72px;
  line-height:68px;
  text-align:center;
}

.or-half.top,
.or-flip-top{
  top:0;
  border-radius:13px 13px 0 0;
  border-bottom:1px solid rgba(166,99,60,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.30)),rgba(255,251,245,.86);
  transform-origin:bottom;
}

.or-half.top span,
.or-flip-top span{top:0}

.or-half.bottom,
.or-flip-bottom{
  bottom:0;
  border-radius:0 0 13px 13px;
  border-top:0;
  background:linear-gradient(180deg,rgba(232,213,198,.20),rgba(255,255,255,.34)),rgba(255,251,245,.78);
  transform-origin:top;
}

.or-half.bottom span,
.or-flip-bottom span{bottom:0}

.or-digit::before{
  content:"";
  position:absolute;
  left:-1px;
  right:-1px;
  top:50%;
  height:1px;
  background:rgba(166,99,60,.20);
  z-index:20;
}

.or-digit::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:13px;
  box-shadow:0 12px 24px rgba(75,41,16,.055);
  pointer-events:none;
  z-index:21;
}

.or-flip-top{
  z-index:10;
  animation:flipTop .32s ease-in forwards;
}

.or-flip-bottom{
  z-index:9;
  transform:rotateX(90deg);
  animation:flipBottom .32s ease-out .29s forwards;
}

@keyframes flipTop{
  from{transform:rotateX(0)}
  to{transform:rotateX(-90deg)}
}

@keyframes flipBottom{
  from{transform:rotateX(90deg)}
  to{transform:rotateX(0)}
}

.or-separator{
  margin-top:-5px;
  color:#8E421F;
  font-family:"Prata",Georgia,serif;
  font-size:34px;
  line-height:1;
}

.or-date{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:8px 24px;
  border-radius:999px;
  border:1px solid rgba(166,99,60,.18);
  background:rgba(255,251,245,.58);
  color:#4B2910;
  font-family:"Prata",Georgia,serif;
  font-size:17px;
  line-height:1.2;
}

.or-greeting{
  margin:10px 0 0;
  color:#6F665E;
  font-family:"Manrope",Arial,sans-serif;
  font-size:12px;
  line-height:1.2;
  font-weight:700;
}

.or-heart{
  margin-right:6px;
  color:#A6633C;
  font-size:11px;
}
</style>
</head>

<body>

<div class="or-widget">
  <p class="or-brand">Odonto Reis</p>

  <div class="or-clock">
    <div class="or-pair">
      <div class="or-digit" data-value="0"></div>
      <div class="or-digit" data-value="0"></div>
    </div>
    <div class="or-separator">:</div>
    <div class="or-pair">
      <div class="or-digit" data-value="0"></div>
      <div class="or-digit" data-value="0"></div>
    </div>
    <div class="or-separator">:</div>
    <div class="or-pair">
      <div class="or-digit" data-value="0"></div>
      <div class="or-digit" data-value="0"></div>
    </div>
  </div>

  <div class="or-date" id="date">Carregando data...</div>
  <p class="or-greeting" id="greeting"></p>
</div>

<script>
const digits=Array.from(document.querySelectorAll(".or-digit"));

function createDigit(el,value){
  el.innerHTML=`
    <div class="or-half top"><span>${value}</span></div>
    <div class="or-half bottom"><span>${value}</span></div>
  `;
  el.dataset.value=value;
}

function flipDigit(el,nextValue){
  const currentValue=el.dataset.value;
  if(currentValue===nextValue)return;

  const top=el.querySelector(".or-half.top span");
  const bottom=el.querySelector(".or-half.bottom span");

  const flipTop=document.createElement("div");
  flipTop.className="or-flip-top";
  flipTop.innerHTML=`<span>${currentValue}</span>`;

  const flipBottom=document.createElement("div");
  flipBottom.className="or-flip-bottom";
  flipBottom.innerHTML=`<span>${nextValue}</span>`;

  top.textContent=nextValue;
  el.appendChild(flipTop);
  el.appendChild(flipBottom);

  setTimeout(()=>{
    bottom.textContent=nextValue;
    el.dataset.value=nextValue;
  },300);

  setTimeout(()=>{
    flipTop.remove();
    flipBottom.remove();
  },700);
}

function updateClock(){
  const now=new Date();

  const time=now.toLocaleTimeString("pt-BR",{
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  }).replaceAll(":","");

  time.split("").forEach((value,index)=>{
    flipDigit(digits[index],value);
  });

  const hour=now.getHours();
  let greeting="Boa noite";

  if(hour>=5&&hour<12)greeting="Bom dia";
  if(hour>=12&&hour<18)greeting="Boa tarde";

  const date=now.toLocaleDateString("pt-BR",{
    weekday:"long",
    day:"2-digit",
    month:"long",
    year:"numeric"
  });

  document.getElementById("date").textContent=date.charAt(0).toUpperCase()+date.slice(1);
  document.getElementById("greeting").innerHTML=
    `<i class="fa-regular fa-heart or-heart"></i>${greeting}, Dra. Ketryn!`;
}

digits.forEach((digit)=>createDigit(digit,"0"));
updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
